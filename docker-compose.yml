services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-hub-postgres
    environment:
      POSTGRES_DB: learning_hub
      POSTGRES_USER: learning_hub
      POSTGRES_PASSWORD: learning_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_hub -d learning_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: learning-hub-backend
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/learning_hub
      SPRING_DATASOURCE_USERNAME: learning_hub
      SPRING_DATASOURCE_PASSWORD: learning_hub
      JWT_SECRET: ${JWT_SECRET:-VGhpcy1pcy1vbmx5LWEtbG9jYWwtZGV2ZWxvcG1lbnQtand0LXNlY3JldC0zMi1ieXRlcyE=}
      APP_STORAGE_LOCAL_ROOT: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  backend-uploads:

