<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<style th:fragment="styles" th:inline="text">
    body {
        margin: 0;
        padding: 0;
        background-color: #f6f8fb;
        font-family: Inter, Roboto, Arial, sans-serif;
        color: #1f2937;
    }
    .email-wrapper {
        width: 100%;
        background-color: #f6f8fb;
        padding: 24px 0;
    }
    .email-container {
        width: 600px;
        max-width: 600px;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e5e7eb;
    }
    .email-header {
        background: linear-gradient(135deg, #1f5eff 0%, #6d28d9 100%);
        padding: 24px 32px;
        color: #ffffff;
    }
    .email-logo {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.2px;
    }
    .email-tagline {
        font-size: 13px;
        opacity: 0.9;
        margin-top: 4px;
    }
    .email-content {
        padding: 32px;
        font-size: 15px;
        line-height: 1.6;
    }
    .greeting {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 16px 0;
    }
    .detail-label {
        color: #6b7280;
        font-size: 13px;
        margin-bottom: 4px;
    }
    .detail-value {
        font-weight: 600;
        margin: 0 0 16px 0;
    }
    .cta-button {
        display: inline-block;
        background-color: #1f5eff;
        color: #ffffff !important;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        margin-top: 8px;
    }
    .support-section {
        padding: 0 32px 24px 32px;
        font-size: 13px;
        color: #6b7280;
        line-height: 1.5;
    }
    .email-footer {
        background-color: #f9fafb;
        padding: 20px 32px;
        font-size: 12px;
        color: #9ca3af;
        line-height: 1.5;
        border-top: 1px solid #e5e7eb;
    }
</style>
</html>
