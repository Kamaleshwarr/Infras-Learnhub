server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: engineering-learning-hub
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/learning_hub}
    username: ${SPRING_DATASOURCE_USERNAME:learning_hub}
    password: ${SPRING_DATASOURCE_PASSWORD:learning_hub}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:25MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:25MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

spring.mail:
  host: ${SPRING_MAIL_HOST:}
  port: ${SPRING_MAIL_PORT:587}
  username: ${SPRING_MAIL_USERNAME:}
  password: ${SPRING_MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: ${SPRING_MAIL_SMTP_AUTH:true}
        starttls:
          enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  security:
    jwt:
      issuer: engineering-learning-hub
      expiration: ${JWT_EXPIRATION:PT1H}
      secret: ${JWT_SECRET:VGhpcy1pcy1vbmx5LWEtbG9jYWwtZGV2ZWxvcG1lbnQtand0LXNlY3JldC0zMi1ieXRlcyE=}
  mail:
    mode: ${APP_MAIL_MODE:log}
    from: ${APP_MAIL_FROM:noreply@learninghub.local}
  password-reset:
    expiration: ${APP_PASSWORD_RESET_EXPIRATION:PT1H}
    frontend-reset-url: ${APP_FRONTEND_RESET_URL:http://localhost:5173/reset-password}
  profile:
    avatar-max-size-bytes: ${APP_PROFILE_AVATAR_MAX_SIZE_BYTES:2097152}
  storage:
    provider: local
    local-root: ${APP_STORAGE_LOCAL_ROOT:./uploads}
    max-file-size-bytes: ${APP_STORAGE_MAX_FILE_SIZE_BYTES:26214400}
  catalog:
    import:
      enabled: ${APP_CATALOG_IMPORT_ENABLED:true}
      fail-fast: ${APP_CATALOG_IMPORT_FAIL_FAST:true}

